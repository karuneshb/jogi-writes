name: Sync Notion to GitHub

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Convert Notion Database to Markdown
        uses: ega4432/notion-to-markdown-action@v0
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        with:
          output_path: 'content/posts'
          filename_property: 'Title'
          # ADD THIS LINE: Maps your Notion properties directly to Hugo front matter
          front_matter_by_properties: 'Status,Category,Date,Reference,Credits'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-node-version: '3.x'

      - name: Download Notion Images & Fix Paths
        run: |
          python -c "
          import os, re, urllib.request, yaml

          content_dir = 'content/posts'
          static_img_dir = 'static/images'
          os.makedirs(static_img_dir, exist_ok=True)

          if os.path.exists(content_dir):
              for filename in os.listdir(content_dir):
                  if filename.endswith('.md') and filename != '_index.md':
                      filepath = os.path.join(content_dir, filename)
                      
                      with open(filepath, 'r', encoding='utf-8') as f:
                          text = f.read()

                      # Separate Front Matter to extract Category
                      parts = text.split('---')
                      if len(parts) >= 3:
                          front_matter = yaml.safe_load(parts[1])
                          
                          # Get Category property (defaults to 'unassigned')
                          category = str(front_matter.get('Category', 'unassigned')).lower().replace(' ', '-')
                          
                          # Target a nested subfolder instead of the root posts folder
                          target_dir = os.path.join(content_dir, category)
                          os.makedirs(target_dir, exist_ok=True)
                          
                          # Create a dynamic folder master index if it doesn't exist yet
                          idx_path = os.path.join(target_dir, '_index.md')
                          if not os.path.exists(idx_path):
                              with open(idx_path, 'w') as idx_f:
                                  folder_title = category.replace('-', ' ').title()
                                  idx_f.write(f'---\ntitle: \"{folder_title}\"\nbookCollapseSection: true\n---\n')

                          # Download images and fix paths
                          content = parts[2]
                          matches = re.findall(r'!\[.*?\]\((http[s]?://.*?)\)', content)
                          for url in matches:
                              try:
                                  clean_name = url.split('/')[-1].split('?')[0]
                                  if not clean_name.endswith(('.png', '.jpg', '.jpeg', '.gif')):
                                      clean_name = f'img_{len(os.listdir(static_img_dir))}.png'
                                  local_path = os.path.join(static_img_dir, clean_name)
                                  urllib.request.urlretrieve(url, local_path)
                                  content = content.replace(url, f'/images/{clean_name}')
                              except Exception as e:
                                  print(f'Failed image download: {e}')

                          # Rebuild file and save inside the nested folder
                          new_fm = yaml.dump(front_matter)
                          new_filepath = os.path.join(target_dir, filename)
                          with open(new_filepath, 'w', encoding='utf-8') as f:
                              f.write(f'---\n{new_fm}---\n{content}')
                          
                          # Remove the old misplaced top-level file if necessary
                          if filepath != new_filepath:
                              os.remove(filepath)
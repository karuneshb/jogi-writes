name: Sync Notion to GitHub

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Convert Notion Database to Markdown
        uses: ega4432/notion-to-markdown-action@v0
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        with:
          output_path: 'content/posts'
          filename_property: 'Title'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-node-version: '3.x'

      - name: Download Notion Images & Fix Paths
        run: |
          python -c "
          import os, re, urllib.request

          content_dir = 'content/posts'
          static_img_dir = 'static/images'
          os.makedirs(static_img_dir, exist_ok=True)

          if os.path.exists(content_dir):
              for filename in os.listdir(content_dir):
                  if filename.endswith('.md'):
                      filepath = os.path.join(content_dir, filename)
                      with open(filepath, 'r', encoding='utf-8') as f:
                          content = f.read()

                      # Match standard markdown image syntax: ![alt](url)
                      matches = re.findall(r'!\[.*?\]\((http[s]?://.*?)\)', content)
                      for url in matches:
                          try:
                              # Sanitize a clean local filename from the URL parameters
                              clean_name = url.split('/')[-1].split('?')[0]
                              if not clean_name.endswith(('.png', '.jpg', '.jpeg', '.gif')):
                                  clean_name = f'img_{len(os.listdir(static_img_dir))}.png'
                              
                              local_path = os.path.join(static_img_dir, clean_name)
                              
                              # Download the image safely
                              urllib.request.urlretrieve(url, local_path)
                              print(f'Downloaded {clean_name}')

                              # Replace the expiring link with Hugo's root relative link
                              content = content.replace(url, f'/images/{clean_name}')
                          except Exception as e:
                              print(f'Failed to download {url}: {e}')

                      with open(filepath, 'w', encoding='utf-8') as f:
                          f.write(content)
          "

      - name: Commit and Push to Repository
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add .
          git diff-index --quiet HEAD || (git commit -m "Automated sync from Notion with local images" && git push)

name: Sync Notion to GitHub

on:
  workflow_dispatch:  # Allows you to trigger the sync manually from the website
  schedule:
    - cron: '0 0 * * *'  # Runs automatically every day at midnight UTC

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Convert Notion Database to Markdown
        uses: ega4432/notion-to-markdown-action@v1
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        with:
          output_path: 'posts'       # Places your write-ups cleanly in a /posts folder
          filename_property: 'Title'  # Uses your column named "Title" for filenames

      - name: Commit and Push to Repository
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add .
          git diff-index --quiet HEAD || (git commit -m "Automated sync from Notion" && git push)

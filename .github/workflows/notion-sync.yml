name: Sync Notion to GitHub

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Convert Notion Database to Markdown
        uses: ega4432/notion-to-markdown-action@v0
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        with:
          output_path: 'content/posts'
          filename_property: 'Title'
          front_matter_by_properties: 'Status,Category,Date,Reference,Credits'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: pip install pyyaml

      - name: Download Notion Images & Fix Paths
        run: python "$GITHUB_WORKSPACE/sort_posts.py"

      - name: Commit and Push to Repository
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add .
          git diff-index --quiet HEAD || (git commit -m "Automated sync from Notion with nested categories" && git push)
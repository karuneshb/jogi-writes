baseURL = 'https://karuneshb.github.io/jogi-writes/'
defaultContentLanguage = 'en'
title = 'jogi-writes'
theme = 'hugo-book'

# Fixes the deprecated languageCode warning
[languages.en]
  locale = 'en-us'

# Fixes the deprecated taxonomy warning
disableKinds = ["taxonomy"]

[params]
  # FIXES THE ERROR: Tells the theme your folder is named "posts" instead of "docs"
  BookSection = 'posts'
  
  # UI Preferences
  BookShowToC = true
  BookEnableJS = true

# Suppresses the raw HTML warnings from Notion exports
ignoreLogs = ['warning-goldmark-raw-html']

# Tells Hugo it's safe to render raw HTML/Markdown features from Notion
[markup.goldmark.renderer]
  unsafe = true
# Keep your existing config at the top, just add this below your params:

[[menu.main]]
  name = "💻 GitHub Profile"
  url = "https://github.com/your-username"
  weight = 10

[[menu.main]]
  name = "👔 LinkedIn"
  url = "https://linkedin.com/in/your-profile"
  weight = 20

[[menu.main]]
  name = "📄 Master's Portfolio"
  url = "https://github.com/your-username/academic-projects"
  weight = 30
[markup]
  [markup.tableOfContents]
    endLevel = 4
    startLevel = 1
